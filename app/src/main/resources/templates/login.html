<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartify - Masuk atau Daftar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --emerald-primary: #059669;
            --emerald-light: #10b981;
            --emerald-accent: #e6f4ea;
            --emerald-glow: rgba(16, 185, 129, 0.15);
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-light: rgba(15, 23, 42, 0.05);
            --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.03);
            --shadow-hover: 0 20px 50px rgba(15, 23, 42, 0.06);
        }
        body {
            background-color: var(--bg-main);
            background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.05) 0%, transparent 60%);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
            padding: 40px 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            width: 100%;
            max-width: 490px;
            overflow: hidden;
            box-shadow: var(--shadow-hover);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .login-header {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.05) 0%, rgba(5, 150, 105, 0.02) 100%);
            border-bottom: 1px solid var(--border-light);
            padding: 35px 30px;
            text-align: center;
        }
        .brand-logo {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .brand-logo i {
            color: var(--emerald-light);
            filter: drop-shadow(0 4px 8px var(--emerald-glow));
        }
        .login-body {
            padding: 35px 30px;
        }
        
        .nav-tabs-custom {
            display: flex;
            background: rgba(15, 23, 42, 0.03);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 30px;
        }
        .nav-link-custom {
            flex: 1;
            text-align: center;
            padding: 10px;
            color: var(--text-secondary);
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav-link-custom.active {
            color: white;
            background: var(--emerald-primary);
            box-shadow: 0 4px 12px var(--emerald-glow);
        }
        .nav-link-custom:hover:not(.active) {
            color: var(--text-primary);
            background: rgba(15, 23, 42, 0.03);
        }
        .form-label-custom {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: block;
        }
        .form-control-custom {
            background: #ffffff;
            border: 1px solid rgba(15, 23, 42, 0.12);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-control-custom:focus {
            background: #ffffff;
            border-color: var(--emerald-light);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.15);
            color: var(--text-primary);
            outline: none;
        }
        .form-control-custom::placeholder {
            color: #94a3b8;
        }
        .btn-custom {
            background: linear-gradient(135deg, var(--emerald-light) 0%, var(--emerald-primary) 100%);
            color: white;
            padding: 13px;
            border-radius: 10px;
            font-weight: 700;
            border: none;
            box-shadow: 0 4px 15px var(--emerald-glow);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(5, 150, 105, 0.2);
            filter: brightness(1.05);
            color: white;
        }
        
        .role-btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .role-btn {
            flex: 1;
            background: #ffffff;
            border: 1px solid rgba(15, 23, 42, 0.1);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.3s;
        }
        .role-btn:hover {
            color: var(--text-primary);
            background: rgba(15, 23, 42, 0.02);
            border-color: rgba(15, 23, 42, 0.15);
        }
        .role-btn.active {
            border-color: var(--emerald-light);
            color: var(--emerald-primary);
            background: var(--emerald-accent);
            box-shadow: inset 0 0 10px rgba(16, 185, 129, 0.05);
        }
        
        .alert-custom {
            border-radius: 12px;
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: #ef4444;
            font-size: 14px;
            padding: 12px 16px;
            font-weight: 500;
        }
        .alert-success-custom {
            border-radius: 12px;
            background: var(--emerald-accent);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--emerald-primary);
            font-size: 14px;
            padding: 12px 16px;
            font-weight: 500;
        }
    </style>
</head>
<body th:data-active-tab="${activeTab != null ? activeTab : 'login'}" onload="initTab(this.getAttribute('data-active-tab'))">

    <div class="login-card">
        <div class="login-header">
            <a href="/" class="brand-logo"><i class="fa-solid fa-cart-shopping"></i>Cartify</a>
            <p class="mb-0 small text-secondary" style="font-weight: 300; color: var(--text-secondary) !important;">Platform E-Commerce Modern, Aman, dan Tepercaya</p>
        </div>
        
        <div class="login-body">
            <!-- Navigation Tabs -->
            <div class="nav-tabs-custom">
                <a href="#" class="nav-link-custom active" id="tabLogin" onclick="switchTab('login')">Masuk</a>
                <a href="#" class="nav-link-custom" id="tabRegister" onclick="switchTab('register')">Daftar Akun</a>
            </div>

            <!-- Messages/Alerts -->
            <div th:if="${error}" class="alert alert-custom mb-3" role="alert" th:text="${error}"></div>
            <div th:if="${errorReg}" class="alert alert-custom mb-3" role="alert" th:text="${errorReg}"></div>
            <div th:if="${successReg}" class="alert alert-success-custom mb-3" role="alert" th:text="${successReg}"></div>

            <!-- FORM LOGIN -->
            <form id="loginForm" action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label-custom">EMAIL / USERNAME</label>
                    <input type="email" name="email" class="form-control form-control-custom w-100" placeholder="contoh@student.telkomuniversity.ac.id" required>
                </div>
                <div class="mb-4">
                    <label class="form-label-custom">PASSWORD</label>
                    <input type="password" name="password" class="form-control form-control-custom w-100" placeholder="Password Anda..." required>
                </div>
                <button type="submit" class="btn btn-custom w-100"><i class="fa-solid fa-right-to-bracket me-2"></i>Masuk Sekarang</button>
            </form>

            <!-- FORM REGISTER -->
            <form id="registerForm" action="/register" method="POST" style="display: none;">
                <input type="hidden" name="role" id="selectedRole" value="Buyer">
                
                <div class="mb-3">
                    <label class="form-label-custom">PILIH PERAN AKUN (ROLE)</label>
                    <div class="role-btn-group">
                        <div class="role-btn active" id="roleBuyer" onclick="setRole('Buyer')"><i class="fa-solid fa-user me-2"></i>Buyer</div>
                        <div class="role-btn" id="roleSeller" onclick="setRole('Seller')"><i class="fa-solid fa-store me-2"></i>Seller</div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label-custom">NAMA LENGKAP</label>
                    <input type="text" name="name" class="form-control form-control-custom w-100" placeholder="Nama lengkap Anda..." required>
                </div>
                <div class="mb-3" id="shopNameGroup" style="display: none;">
                    <label class="form-label-custom">NAMA TOKO (KHUSUS SELLER)</label>
                    <input type="text" name="shopName" id="regShopName" class="form-control form-control-custom w-100" placeholder="Nama toko online Anda...">
                </div>
                <div class="mb-3">
                    <label class="form-label-custom">EMAIL</label>
                    <input type="email" name="email" class="form-control form-control-custom w-100" placeholder="contoh@student.telkomuniversity.ac.id" required>
                </div>
                <div class="mb-3">
                    <label class="form-label-custom">PASSWORD</label>
                    <input type="password" name="password" class="form-control form-control-custom w-100" placeholder="Buat password aman..." required>
                </div>
                <div class="mb-4">
                    <label class="form-label-custom">ALAMAT LENGKAP</label>
                    <textarea name="address" class="form-control form-control-custom w-100" rows="2" placeholder="Alamat rumah..." required></textarea>
                </div>
                <button type="submit" class="btn btn-custom w-100"><i class="fa-solid fa-user-plus me-2"></i>Daftar Sekarang</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function initTab(tab) {
            switchTab(tab);
        }

        function switchTab(mode) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');

            if (mode === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                tabLogin.classList.remove('active');
                tabRegister.classList.add('active');
            }
        }

        function setRole(role) {
            document.getElementById('selectedRole').value = role;
            const buyerBtn = document.getElementById('roleBuyer');
            const sellerBtn = document.getElementById('roleSeller');
            const shopNameGroup = document.getElementById('shopNameGroup');
            const shopInput = document.getElementById('regShopName');

            if (role === 'Buyer') {
                buyerBtn.classList.add('active');
                sellerBtn.classList.remove('active');
                shopNameGroup.style.display = 'none';
                shopInput.removeAttribute('required');
            } else {
                buyerBtn.classList.remove('active');
                sellerBtn.classList.add('active');
                shopNameGroup.style.display = 'block';
                shopInput.setAttribute('required', 'required');
            }
        }
    </script>
</body>
</html>
